################
### MONITORS ###
################
monitor=DP-2,2560x1440@170,0x0,1       # ASUS VG27AC1A (main, left)
monitor=DP-3,2560x1440@170,2560x0,1   # Gigabyte M27Q (secondary, right)

# Pin workspaces to monitors
workspace = 1,  monitor:DP-2, default:true
workspace = 2,  monitor:DP-2
workspace = 3,  monitor:DP-2
workspace = 4,  monitor:DP-2
workspace = 5,  monitor:DP-2
workspace = 6,  monitor:DP-3, default:true
workspace = 7,  monitor:DP-3
workspace = 8,  monitor:DP-3
workspace = 9,  monitor:DP-3
workspace = 10, monitor:DP-3


###################
### NVIDIA ENVS ###
###################
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QML_IMPORT_PATH,/usr/local/lib64/qt6/qml
env = PATH,$HOME/.local/bin:/usr/local/bin:/usr/bin:/bin


#####################
### AUTOSTART      ###
#####################
exec-once = swww-daemon
# caelestia-shell replaces both waybar (bar) and mako (notifications).
# It also handles: OSD overlays, app launcher, lock screen, session menu.
exec-once = caelestia shell -d
exec-once = sh -c '/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 || /usr/libexec/polkit-gnome-authentication-agent-1'
exec-once = nm-applet --indicator
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = ydotoold


#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(cba6f7ff) rgba(89b4faff) 45deg
    col.inactive_border = rgba(313244ff)
    resize_on_border = true
    layout = dwindle
}

decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(1a1a2ecc)
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = false
    }
}

animations {
    enabled = true

    bezier = easeOut,  0.16, 1, 0.3, 1
    bezier = easeIn,   0.7, 0, 0.84, 0
    bezier = spring,   0.25, 0.46, 0.45, 0.94

    animation = windows,     1, 4,  easeOut, slide
    animation = windowsOut,  1, 3,  easeIn,  slide
    animation = border,      1, 6,  default
    animation = fade,        1, 4,  easeOut
    animation = workspaces,  1, 4,  spring, slidevert
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = slave
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}


#####################
### INPUT          ###
#####################
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat

    touchpad {
        natural_scroll = true
    }
}


#####################
### KEYBINDINGS   ###
#####################
$mod = SUPER
$terminal = ghostty
# caelestia-shell has a built-in launcher — toggle it via the CLI.
# Fallback: wofi --show drun
$launcher = $HOME/.local/bin/caelestia shell drawers toggle launcher

# Core
bind = $mod, Return,      exec, $terminal
bind = $mod, Space,       exec, $launcher
bind = $mod, C,           killactive
bind = $mod SHIFT CTRL, Q, exit
bind = $mod, F,           fullscreen, 0
bind = $mod SHIFT, F,     fullscreen, 1
bind = $mod, V,           togglefloating
bind = $mod, P,           pseudo
bind = $mod, E,           togglesplit

# Game mode — toggles caelestia game mode (suppresses notifs) and hides/shows the bar
bind = $mod, G, exec, $HOME/.local/bin/caelestia-gamemode

# Rapid-fire toggle: hold the button to rapid-fire while active (~20 clicks/sec)
bind = $mod, R, exec, $HOME/.local/bin/rapidfire-toggle left
bind = $mod, M, exec, $HOME/.local/bin/rapidfire-toggle middle

# Screenshot (macOS-style)
bind = CTRL SHIFT, 3, exec, grim - | wl-copy
bind = CTRL SHIFT, 4, exec, grim -g "$(slurp)" - | wl-copy

# Clipboard history
bind = $mod, semicolon, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Focus (vim-style + arrow keys)
bind = ALT, h,     movefocus, l
bind = ALT, l,     movefocus, r
bind = ALT, k,     movefocus, u
bind = ALT, j,     movefocus, d
bind = ALT, left,  movefocus, l
bind = ALT, right, movefocus, r
bind = ALT, up,    movefocus, u
bind = ALT, down,  movefocus, d

# Move windows (vim-style)
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, j, movewindow, d

# Resize (arrow keys)
binde = $mod CTRL, right, resizeactive,  40 0
binde = $mod CTRL, left,  resizeactive, -40 0
binde = $mod CTRL, up,    resizeactive,  0 -40
binde = $mod CTRL, down,  resizeactive,  0 40

# ASUS (main, left) — ALT+1-5
bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 4, workspace, 4
bind = ALT, 5, workspace, 5

# Gigabyte (secondary, right) — ALT+Q-T
bind = ALT, Q, workspace, 6
bind = ALT, W, workspace, 7
bind = ALT, E, workspace, 8
bind = ALT, R, workspace, 9
bind = ALT, T, workspace, 10

# Move window to workspace — SHIFT+ALT+1-5
bind = SHIFT ALT, 1, movetoworkspace, 1
bind = SHIFT ALT, 2, movetoworkspace, 2
bind = SHIFT ALT, 3, movetoworkspace, 3
bind = SHIFT ALT, 4, movetoworkspace, 4
bind = SHIFT ALT, 5, movetoworkspace, 5

# Move window to workspace — SHIFT+ALT+Q-T
bind = SHIFT ALT, Q, movetoworkspace, 6
bind = SHIFT ALT, W, movetoworkspace, 7
bind = SHIFT ALT, E, movetoworkspace, 8
bind = SHIFT ALT, R, movetoworkspace, 9
bind = SHIFT ALT, T, movetoworkspace, 10

# Scroll through workspaces
bind = $mod, mouse_down, workspace, e-1
bind = $mod, mouse_up,   workspace, e+1

# Move/resize with mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Move focus between monitors
bind = $mod, comma,  focusmonitor, l
bind = $mod, period, focusmonitor, r

# Move workspace to other monitor
bind = $mod SHIFT, comma,  movecurrentworkspacetomonitor, l
bind = $mod SHIFT, period, movecurrentworkspacetomonitor, r

# Media keys
bind = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioPlay,         exec, playerctl play-pause
bind = , XF86AudioNext,         exec, playerctl next
bind = , XF86AudioPrev,         exec, playerctl previous
bind = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Lock screen (caelestia-shell manages the lock UI)
bind = $mod, Escape, exec, caelestia lock


#####################
### WINDOW RULES  ###
#####################
windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin,   title:^(Picture-in-Picture)$

# Fix XWayland apps
windowrulev2 = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0
