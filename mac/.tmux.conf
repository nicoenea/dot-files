# Tabs live here now: one tmux session per Ghostty window (started from
# .zshrc), and tmux windows act as tabs — invisible to macOS, so AeroSpace
# tiling stays intact. Prefix is the default ctrl-b; the Ghostty keybinds
# (cmd+t, ctrl+tab, ctrl+shift+tab) send the prefix sequences for you.

set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 100000
set -sg escape-time 10
set -g focus-events on

# truecolor
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# closing a Ghostty window kills its session instead of orphaning it detached
set -g destroy-unattached on

# new tabs/splits inherit the current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# status bar as a tab bar at the top (Snazzy colors)
set -g status-position top
set -g status-style "bg=#282a36,fg=#f1f1f0"
set -g status-left ""
set -g status-right ""
set -g window-status-separator ""
set -g window-status-format "#[bg=#3b3d4a,fg=#a8a8a8]  #I  #{=35:pane_title}  #[bg=default]"
set -g window-status-current-format "#[bg=#57c7ff,fg=#282a36,bold]  #I  #{=35:pane_title}  #[bg=default]"

# tab labels above use the terminal title (like native tabs did); also pass
# the active tab's title through to the Ghostty window itself
set -g set-titles on
set -g set-titles-string "#{pane_title}"
