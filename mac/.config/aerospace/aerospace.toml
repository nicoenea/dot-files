# AeroSpace config
after-login-command = []
after-startup-command = ['layout tiling']

start-at-login = true

enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

[workspace-to-monitor-force-assignment]
1 = 'secondary'  # main work monitor (external monitor)
2 = 'secondary'
3 = 'secondary'
4 = 'secondary'
5 = 'main'       # Laptop screen (chat/terminal)
6 = 'main'
7 = 'main'
8 = 'main'

[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.bottom = 0
outer.top = 0
outer.right = 0

[mode.main.binding]
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-q = 'workspace 5'
alt-w = 'workspace 6'
alt-e = 'workspace 7'
alt-r = 'workspace 8'

alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-q = 'move-node-to-workspace 5'
alt-shift-w = 'move-node-to-workspace 6'
alt-shift-e = 'move-node-to-workspace 7'
alt-shift-r = 'move-node-to-workspace 8'


# Add this section to handle Ghostty tabs
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
 run = ['layout floating']

# Add this section to handle Ghostty tabs
[[on-window-detected]]
if.app-id = 'finder'
run = ['layout floating']

# Or alternatively, you can exclude Ghostty from tiling entirely:
# [exec]
# inherit-env-vars = true
# [exec.env-vars]
# This tells AeroSpace to ignore certain window types